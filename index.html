<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="UX Research web flipbook" />
  <title>UX Research Webbook</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    :root {
      --bg: #ffffff;
      --ink: #111417;
      --paper: #ffffff;
      --yellow: #FFEF11;
      --green: #2EFF4A;
      --red: #FF2E2E;
      --blue: #9CE4FF;
      --muted: #777d83;
      --edge: #c9c9c9;
      --shadow: rgba(25, 25, 25, 0.18);
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: Inter, "Apple SD Gothic Neo", "Pretendard", system-ui, sans-serif;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: grid;
      grid-template-rows: 1fr auto;
      place-items: center;
      min-height: 100vh;
      padding: 34px clamp(14px, 3vw, 54px) 24px;
    }

    .stage {
      width: min(96vw, 1760px);
      height: min(78vh, 940px);
      display: grid;
      place-items: center;
      perspective: 2600px;
      position: relative;
    }

    .book-shell {
      position: relative;
      width: min(92vw, calc(78vh * 2.711), 1640px);
      aspect-ratio: 2928 / 1080;
      display: grid;
      place-items: center;
      filter: drop-shadow(0 22px 26px var(--shadow));
      transform: rotateX(2deg);
      transform-style: preserve-3d;
    }

    .book-shell::before,
    .book-shell::after {
      content: none;
      position: absolute;
      top: 2.1%;
      right: -1.45%;
      width: 2.6%;
      height: 95.8%;
      border: 2px solid #8a8d8f;
      border-left: 0;
      background: repeating-linear-gradient(
        90deg,
        #f9f9f9 0 4px,
        #cfd1d1 4px 6px
      );
      transform: translateZ(-18px) skewY(3deg);
      z-index: 0;
    }

    .book-shell::after {
      right: -2.15%;
      transform: translateZ(-32px) skewY(4deg);
      opacity: 0.7;
    }

    .book {
      width: 100%;
      height: 100%;
      position: relative;
      z-index: 2;
      opacity: 1;
      transition: opacity 0.18s ease;
    }

    body[data-at-cover="true"]:not(.cover-opening) .book {
      opacity: 0;
    }

    .cover-overlay {
      position: absolute;
      top: 0;
      left: 50%;
      width: 50%;
      height: 100%;
      z-index: 9;
      overflow: hidden;
      background: var(--paper);
      box-shadow: inset -22px 0 28px rgba(0,0,0,0.05);
      transform: translateX(-50%);
      transform-origin: left center;
      will-change: left, transform;
      transition:
        left 0.62s cubic-bezier(0.22, 1, 0.36, 1),
        transform 0.62s cubic-bezier(0.22, 1, 0.36, 1),
        opacity 0.18s ease;
      pointer-events: none;
    }

    .cover-overlay svg,
    .cover-overlay img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
    }

    body:not([data-at-cover="true"]) .cover-overlay {
      opacity: 0;
    }

    body.cover-opening .cover-overlay {
      left: 0;
      transform: translateX(0);
    }

    .intro-right-page {
      position: absolute;
      top: 0;
      right: 0;
      width: 50%;
      height: 100%;
      z-index: 5;
      background: var(--paper);
      overflow: hidden;
      opacity: 0;
      transition: opacity 0.18s ease 0.32s;
      pointer-events: none;
    }

    .intro-right-page svg,
    .intro-right-page img {
      width: 100%;
      height: 100%;
      display: block;
      background: var(--paper);
      object-fit: cover;
    }

    body.cover-opening .intro-right-page {
      opacity: 1;
    }

    body:not([data-at-cover="true"]) .intro-right-page {
      display: none;
    }

    .page {
      background: var(--paper);
      overflow: hidden;
      position: relative;
    }

    .page svg,
    .page img {
      width: 100%;
      height: 100%;
      display: block;
      background: var(--paper);
      object-fit: cover;
    }

    .laptop-video {
      position: absolute;
      left: 13.11%;
      top: 17.87%;
      width: 74.25%;
      height: 60.65%;
      border: 0;
      border-radius: 0.9%;
      object-fit: cover;
      display: block;
      z-index: 2;
      background: #050505;
      pointer-events: none;
    }

    .page::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: linear-gradient(90deg, rgba(0,0,0,0.05), transparent 5%, transparent 95%, rgba(0,0,0,0.03));
      mix-blend-mode: multiply;
      opacity: 0.18;
    }

    .page[data-density="hard"] {
      box-shadow: inset -18px 0 26px rgba(0,0,0,0.05);
    }

    .arrow {
      position: absolute;
      top: 50%;
      width: 46px;
      height: 46px;
      border: 0;
      background: transparent;
      color: var(--ink);
      display: grid;
      place-items: center;
      cursor: pointer;
      z-index: 12;
      transform: translateY(-50%);
    }

    .arrow svg {
      width: 42px;
      height: 42px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2.8;
      stroke-linecap: round;
      stroke-linejoin: round;
      filter: drop-shadow(0 2px 0 rgba(255,255,255,0.6));
    }

    .arrow.prev { left: -34px; }
    .arrow.next { right: -34px; }
    .arrow:disabled { opacity: 0.22; cursor: default; }

    .toolbar {
      width: min(92vw, 1640px);
      min-height: 42px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .progress {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 236px;
    }

    .progress-line {
      width: min(24vw, 240px);
      height: 2px;
      background: rgba(0,0,0,0.12);
      position: relative;
      overflow: hidden;
    }

    .progress-line span {
      display: block;
      width: 0%;
      height: 100%;
      background: var(--green);
      transition: width 0.35s ease;
    }

    .hint {
      text-align: right;
      white-space: nowrap;
    }

    .corner-mark {
      position: fixed;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      z-index: 1;
    }

    .corner-mark.a { top: 8%; left: 7.5%; background: var(--yellow); }
    .corner-mark.b { top: 8%; right: 7.5%; background: var(--green); }
    .corner-mark.c { bottom: 9%; left: 7.5%; background: var(--red); }
    .corner-mark.d { bottom: 9%; right: 7.5%; background: var(--blue); }

    @media (max-width: 860px) {
      body {
        overflow-y: auto;
        padding: 18px 12px;
      }

      .stage {
        width: 100%;
        height: auto;
        min-height: 74vh;
      }

      .book-shell {
        width: min(94vw, 760px);
        aspect-ratio: 2928 / 1080;
      }

      .book-shell::before,
      .book-shell::after,
      .corner-mark {
        display: none;
      }

      .arrow.prev { left: 4px; }
      .arrow.next { right: 4px; }
      .arrow {
        top: calc(100% + 28px);
        width: 44px;
        height: 44px;
      }

      .toolbar {
        width: 94vw;
        margin-top: 46px;
        font-size: 11px;
      }

      .hint { display: none; }
    }
  </style>
</head>
<body data-at-cover="true">
  <span class="corner-mark a"></span>
  <span class="corner-mark b"></span>
  <span class="corner-mark c"></span>
  <span class="corner-mark d"></span>

  <main class="stage" aria-label="UX Research webbook">
    <section class="book-shell">
      <div id="book" class="book"></div>
      <div class="intro-right-page" aria-hidden="true">
        <img src="png/page_01.png" alt="" />
      </div>
      <div class="cover-overlay" aria-hidden="true">
        <img src="cover.svg" alt="" />
      </div>
      <button class="arrow prev" id="prevPage" aria-label="Previous page">
        <svg viewBox="0 0 48 48" aria-hidden="true">
          <path d="M28 9 13 24l15 15" />
          <path d="M14 24h25" />
        </svg>
      </button>
      <button class="arrow next" id="nextPage" aria-label="Next page">
        <svg viewBox="0 0 48 48" aria-hidden="true">
          <path d="M20 9 35 24 20 39" />
          <path d="M34 24H9" />
        </svg>
      </button>
    </section>
  </main>

  <footer class="toolbar">
    <div class="progress" aria-live="polite">
      <span id="pageNow">01</span>
      <div class="progress-line" aria-hidden="true"><span id="progressBar"></span></div>
      <span id="pageTotal">42</span>
    </div>
    <div class="hint">Drag corners or use arrow keys</div>
  </footer>

  <script src="page-flip.browser.js"></script>
  <script>
    const pageWidth = 1464;
    const pageHeight = 1080;
    const pages = [
      { type: "cover", src: "cover.svg" },
      { type: "page", src: "png/page_01.png" },
      { type: "page", src: "png/page_02.png" },
      { type: "page", src: "png/page_03.png" },
      { type: "page", src: "png/page_04.png" },
      { type: "page", src: "png/page_05.png" },
      { type: "page", src: "png/page_06.png" },
      { type: "page", src: "png/page_07.png" },
      { type: "page", src: "png/page_08.png" },
      { type: "page", src: "png/page_09.png" },
      { type: "page", src: "png/page_10.png" },
      { type: "page", src: "png/page_11.png" },
      { type: "page", src: "png/page_12.png" },
      { type: "page", src: "png/page_13.png" },
      { type: "page", src: "png/page_14.png" },
      { type: "page", src: "png/page_15.png" },
      { type: "page", src: "png/page_16.png" },
      { type: "page", src: "png/page_17.png" },
      { type: "page", src: "png/page_18.png" },
      { type: "page", src: "png/page_19.png" },
      { type: "page", src: "png/page_20.png" },
      { type: "page", src: "png/page_21.png" },
      { type: "page", src: "png/page_22.png" },
      { type: "page", src: "png/page_23.png" },
      { type: "page", src: "png/page_24.png" },
      { type: "page", src: "png/page_25.png" },
      { type: "page", src: "png/page_26.png" },
      { type: "page", src: "png/page_27.png" },
      { type: "page", src: "png/page_28.png" },
      { type: "page", src: "png/page_29.png" },
      { type: "page", src: "png/page_30.png" },
      { type: "page", src: "png/page-31.png" },
      { type: "page", src: "png/page-32.png" },
      { type: "page", src: "png/page_33.png" },
      { type: "page", src: "png/page_34.png" },
      { type: "page", src: "png/page-35.png" },
      { type: "page", src: "png/page_36.png", video: "finalmotion.mp4" },
      { type: "page", src: "png/page_37.png" },
      { type: "page", src: "png/page_38.png" },
      { type: "page", src: "png/page_39.png" },
      { type: "page", src: "png/page_40.png" },
      { type: "back", src: "back.svg" }
    ];

    const book = document.getElementById("book");
    const pageNow = document.getElementById("pageNow");
    const pageTotal = document.getElementById("pageTotal");
    const progressBar = document.getElementById("progressBar");
    const prevButton = document.getElementById("prevPage");
    const nextButton = document.getElementById("nextPage");
    let currentIndex = 0;
    let turning = false;
    let pageFlip = null;

    function makePage(data, index) {
      const page = document.createElement("div");
      page.className = "page";
      page.dataset.page = String(index + 1);
      if (index === 0 || index === pages.length - 1) page.dataset.density = "hard";
      page.innerHTML = `<img src="${data.src}" alt="${data.type === "back" ? "Back cover" : data.type === "cover" ? "Cover" : `Page ${index}`}" />`;
      if (data.video) {
        page.insertAdjacentHTML("beforeend", `
          <video class="laptop-video" src="${data.video}" autoplay muted loop playsinline preload="metadata"></video>
        `);
      }
      return page;
    }

    pageTotal.textContent = String(pages.length).padStart(2, "0");

    function initBook(startPage = 1) {
      if (pageFlip) {
        pageFlip.turnToPage(startPage);
        return;
      }

      pages.forEach((page, index) => book.appendChild(makePage(page, index)));

      pageFlip = new St.PageFlip(book, {
        width: pageWidth / 2,
        height: pageHeight / 2,
        size: "stretch",
        minWidth: 300,
        maxWidth: pageWidth / 2,
        minHeight: 222,
        maxHeight: pageHeight / 2,
        maxShadowOpacity: 0.19,
        showCover: true,
        startPage,
        mobileScrollSupport: false,
        useMouseEvents: true,
        swipeDistance: 18,
        flippingTime: 760,
        drawShadow: true,
        showPageCorners: true
      });
      window.webbook = pageFlip;

      pageFlip.on("flip", event => setUi(event.data));
      pageFlip.on("init", event => setUi(event.data.page));
      pageFlip.loadFromHTML(document.querySelectorAll(".page"));
    }

    function setUi(index) {
      currentIndex = index;
      const page = index + 1;
      pageNow.textContent = String(page).padStart(2, "0");
      progressBar.style.width = `${(page / pages.length) * 100}%`;
      prevButton.disabled = index === 0;
      nextButton.disabled = index >= pages.length - 1;
      document.body.dataset.atCover = index === 0 ? "true" : "false";
      if (index === 0) document.body.classList.remove("cover-opening");
    }

    function goPrev() {
      if (turning) return;
      if (!pageFlip) return;
      turning = true;
      pageFlip.flipPrev("top");
      window.setTimeout(() => { turning = false; }, 980);
    }

    function goNext() {
      if (turning) return;
      turning = true;
      if (currentIndex === 0) {
        document.body.classList.add("cover-opening");
        window.setTimeout(() => {
          document.body.dataset.atCover = "false";
          initBook(1);
          document.body.classList.remove("cover-opening");
          turning = false;
        }, 680);
        return;
      }
      if (!pageFlip) initBook(currentIndex);
      pageFlip.flipNext("top");
      window.setTimeout(() => { turning = false; }, 980);
    }

    prevButton.addEventListener("click", goPrev);
    nextButton.addEventListener("click", goNext);

    window.addEventListener("keydown", event => {
      if (event.key === "ArrowLeft") goPrev();
      if (event.key === "ArrowRight" || event.key === " ") goNext();
    });

    setUi(0);
  </script>
</body>
</html>
